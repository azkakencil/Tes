<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game - AI DANZZ44</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Papan Catur -->
        <div class="board-container">
            <div class="player-info" id="player-black">
                <span><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'></path><circle cx='12' cy='7' r='4'></circle></svg>" style="vertical-align:middle"> Pemain Hitam</span>
            </div>
            
            <div class="board" id="board">
                <!-- Javascript will render squares here -->
            </div>

            <div class="player-info active" id="player-white">
                <span><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'></path><circle cx='12' cy='7' r='4'></circle></svg>" style="vertical-align:middle"> Pemain Putih</span>
            </div>
        </div>

        <!-- Panel Status & Kontrol -->
        <div class="panel">
            <div class="status-box">
                <h2>Catur Modern</h2>
                <div id="status-text" style="color: #e2e8f0; font-size: 1.2rem; margin-bottom: 0.5rem;">Giliran: Putih</div>
                <p id="check-text"></p>
            </div>

            <div class="controls">
                <button class="btn" id="btn-undo">Undo Move</button>
                <button class="btn primary" id="btn-restart">Restart</button>
            </div>

            <div class="history">
                <h3>Riwayat Langkah</h3>
                <ul class="history-list" id="history-list">
                    <!-- History log generated by JS -->
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
